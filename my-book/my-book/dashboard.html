<p>Thanks for creating an account. Use the button below to purchase the book via PayPal.</p>


<!-- PayPal form using classic HTML POST to PayPal. It opens a PayPal payment page in a new tab. -->
<form id="paypalForm" action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
  <input type="hidden" name="cmd" value="_xclick">
  <input type="hidden" name="business" value="dicejones47@gmail.com">
  <input type="hidden" name="item_name" value="Tracks of a Modern-Day Hobo - Paperback">
  <input type="hidden" name="amount" value="24.99">
  <input type="hidden" name="currency_code" value="USD">

  <!-- This will hold the Firebase UID -->
  <input type="hidden" name="custom" id="paypalCustom">

  <!-- background notification URL -->
  <input type="hidden" name="notify_url" value="https://YOUR-BACKEND-URL.com/paypal/ipn">

  <!-- where user goes after payment -->
  <input type="hidden" name="return" value="https://your-domain.com/thankyou.html">

  <button class="btn" type="submit">Buy now — $24.99</button>
</form>



</section>

  new Card({
